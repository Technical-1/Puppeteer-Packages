# release.yml — Changesets publish pipeline (npm OIDC trusted publishing)
#
# AUTH: OIDC trusted publishing — NO npm token.
#   `pnpm changeset publish` runs under pnpm 10 (which performs the GitHub
#   OIDC → npm token exchange) with `id-token: write`. There is intentionally
#   NO NPM_TOKEN / NODE_AUTH_TOKEN and NO `registry-url` .npmrc auth line —
#   OIDC only engages when no auth token is present.
#
# ONE-TIME PREREQUISITE (npmjs.com, needs the account's 2FA/passkey):
#   Register a trusted publisher for the @technical-1 scope (npm 11 supports
#   bulk scope-level config via `npm trust`, or configure per package):
#     - Repository:  Technical-1/Puppeteer-Packages
#     - Workflow:    release.yml
#     - (no GitHub environment is used)
#   Until that trusted publisher exists, the publish step will be rejected.
#   The FIRST publish of a brand-new package cannot use OIDC (npm requires the
#   package to exist first); 0.1.0 was bootstrapped manually with a one-time
#   automation token, after which that token was revoked.
#
# WORKSPACE PROTOCOL — workspace:^ rewrite:
#   Internal deps are `workspace:^`; pnpm rewrites them to concrete `^x.y.z`
#   at pack time, so npm consumers auto-satisfy a newer compatible internal
#   dep. (Plan 09 / P9T1 decision.)
#
# PROVENANCE: with OIDC trusted publishing npm generates provenance
#   automatically (id-token: write is the only requirement).

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC token exchange + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.34.1

      # Node 24 ships an OIDC-capable toolchain (OIDC needs Node >= 22.14).
      # No registry-url: we deliberately avoid writing an .npmrc auth line so
      # OIDC isn't shadowed by an (empty) token.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: release packages"
          title: "Release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN / NODE_AUTH_TOKEN — publish authenticates via OIDC.
          # pnpm publish does NOT attach provenance automatically (unlike
          # `npm publish`), so request it explicitly. Takes effect next release.
          NPM_CONFIG_PROVENANCE: "true"
