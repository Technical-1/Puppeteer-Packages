name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.34.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Changeset-status guard: PR must include a changeset file. Runs on PRs
      # only; push-to-main skips this (changesets are consumed on merge). The
      # auto-generated Changesets "Version PR" (head changeset-release/*) is
      # exempt — it intentionally has no changesets (it consumes them).
      # Runs on both matrix legs — harmless duplication, avoids matrix-leg
      # conditional fragility.
      - name: Verify changeset present
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          pnpm changeset status --since="origin/$BASE_REF"

      - run: pnpm turbo run typecheck lint test build

      # Coverage gate (once, on the node-24 leg): fails below the thresholds
      # in vitest.config.ts (90% lines/branches/functions/statements).
      - name: Coverage gate
        if: matrix.node == 24
        run: pnpm vitest run --coverage

      # Upload dist/ artifacts from the node-24 leg only so the integration
      # job can download them instead of rebuilding from scratch.
      - name: Upload dist artifacts
        if: matrix.node == 24
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-packages
          path: packages/*/dist
          retention-days: 1

  integration:
    runs-on: ubuntu-latest
    needs: [build]
    env:
      PPTR_IT: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.34.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Restore pre-built dist/ from the build job (node-22 leg) to avoid
      # a full rebuild. No automatic fallback: if the artifact has expired
      # (retention-days: 1) or is otherwise absent, re-run the build job
      # first so it re-uploads dist-packages before retrying this job.
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-packages
          path: packages

      # Cache the Chrome binary downloaded by ensureChrome() so we don't hit
      # the CDN on every integration run.
      - name: Cache Chrome for Testing
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/puppeteer
          # Not pinned to a version: chrome-setup resolves latest-stable at
          # install time. The cache accumulates builds; when stable advances,
          # the new build is downloaded during the run (covered by hookTimeout).
          key: ${{ runner.os }}-puppeteer-cache

      # Run integration tests explicitly with PPTR_IT=1.
      # ensureChrome() downloads Chrome on first run (cache miss) and resolves
      # from ~/.cache/puppeteer on subsequent runs. Tests launch with
      # --no-sandbox (set inside the @technical-1/launcher package).
      - name: Run integration tests
        run: PPTR_IT=1 pnpm --filter @technical-1/integration-tests test
